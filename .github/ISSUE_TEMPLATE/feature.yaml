name: ✨ Feature / Amélioration
description: Proposer une nouvelle fonctionnalité ou amélioration
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      description: Quel besoin / pain point cette feature adresse ?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: Décris la fonctionnalité souhaitée
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      placeholder: Autres approches que tu as considérées
  - type: dropdown
    id: priority
    attributes:
      label: Priorité estimée
      options:
        - Nice to have
        - Utile
        - Important
        - Critique